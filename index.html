<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research Sharing Slot Machine</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <div class="hero-badge">Research Sharing</div>
      <h1>Finance Transformation - Learning Slot Machine</h1>
      <p>Spin, explore and discover curated content across categories.</p>
    </section>

    <section class="global-controls">
      <button id="startAllBtn" class="btn btn-primary">Start All</button>
      <button id="stopAllBtn" class="btn btn-secondary">Stop All</button>
      <button id="continueAllBtn" class="btn btn-secondary">Continue All</button>
    </section>

    <section id="categoriesGrid" class="categories-grid"></section>

    <section class="selection-wrapper">
      <div class="selection-header">
        <span class="selection-kicker">Current Picks</span>
        <h2>Your selection</h2>
      </div>
      <div id="finalSelection" class="final-selection"></div>
    </section>

    <section class="admin-zone">
      <div class="admin-zone-inner">
        <button id="toggleAdminBtn" class="admin-toggle">Admin</button>

        <div id="adminPanel" class="admin-panel hidden">
          <div id="authPanel" class="auth-panel">
            <h3>Geschützter Bereich</h3>
            <p>Nur für das Aktualisieren der Excel-Daten.</p>
            <div class="auth-row">
              <input
                id="passwordInput"
                type="password"
                placeholder="Passwort eingeben"
                class="password-input"
              />
              <button id="unlockBtn" class="btn btn-primary">Freischalten</button>
            </div>
            <div id="authMessage" class="admin-message"></div>
          </div>

          <div id="uploadPanel" class="upload-panel hidden">
            <h3>Excel hochladen</h3>
            <p class="upload-hint">
              Erwartet wird ein Blatt mit dem Namen <strong>Links</strong>.
            </p>

            <label class="upload-box">
              <span>Excel-Datei auswählen</span>
              <input type="file" id="excelFile" accept=".xlsx,.xls" />
            </label>

            <div class="upload-actions">
              <button id="lockBtn" class="btn btn-secondary">Wieder sperren</button>
            </div>

            <div id="statusBar" class="admin-message"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <template id="categoryTemplate">
    <article class="category-card">
      <div class="category-header">
        <img class="category-image" alt="" />
        <div class="category-overlay"></div>
        <div class="category-label-wrap">
          <h3 class="category-title"></h3>
        </div>
      </div>

      <div class="category-body">
        <div class="slot-window">
          <a class="result-card" href="#" target="_blank" rel="noopener noreferrer">
            <div class="result-author"></div>
            <div class="result-title"></div>
            <div class="result-meta">
              <span class="type-icon"></span>
              <span class="type-label"></span>
            </div>
          </a>
        </div>

        <div class="card-controls">
          <button class="btn start-btn">Start</button>
          <button class="btn stop-btn">Stop</button>
          <button class="btn continue-btn">Continue</button>
        </div>
      </div>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
